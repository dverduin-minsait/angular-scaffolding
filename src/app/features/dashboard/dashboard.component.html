<div class="dashboard">

  <div class="dashboard-body" #dashboardBody>
    <section
      class="dashboard-grid"
      [class.dragging]="isDragging()"
      [style.grid-template-columns]="gridTemplateColumns()"
      [style.grid-template-rows]="gridTemplateRows()"
      [style.--cell-size]="cellSizePx()"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp()"
      (pointerleave)="onPointerUp()"
      role="region"
      [attr.aria-label]="'dashboard.gridLabel' | translate">

      <!-- Grid background cells for visual reference -->
      @for (cell of gridCells(); track cell.key) {
        <div
          class="grid-cell"
          [class.occupied]="isCellOccupied(cell.col, cell.row)"
          [class.preview-valid]="isCellInValidPreview(cell.col, cell.row)"
          [class.preview-invalid]="isCellInInvalidPreview(cell.col, cell.row)"
          [style.grid-column]="cell.col + 1"
          [style.grid-row]="cell.row + 1"
          aria-hidden="true">
        </div>
      }

      <!-- Widgets -->
      @for (widget of layoutService.widgets(); track widget.id) {
        <app-dashboard-widget
          [widget]="widget"
          [cellSize]="breakpointService.cellSize()"
          [isDragging]="isWidgetDragging(widget.id)"
          [previewPosition]="getPreviewPosition(widget.id)"
          [previewSize]="getPreviewSize(widget.id)"
          (moveStarted)="onMoveStart($event)"
          (resizeStarted)="onResizeStart($event)"
          (keyboardMove)="onKeyboardMove($event)"
          (keyboardResize)="onKeyboardResize($event)"
          (removed)="onWidgetRemoved($event)">
          <ng-container
            [ngComponentOutlet]="getWidgetComponent(widget.type)"
            [ngComponentOutletInjector]="getWidgetInjector(widget)" />
        </app-dashboard-widget>
      }
    </section>
  </div>
</div>
