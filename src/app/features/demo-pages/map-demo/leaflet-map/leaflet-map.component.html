<div
  #mapContainer
  class="leaflet-map__container"
  [class.leaflet-map__container--fullscreen]="isFullscreen()"
  role="application"
  aria-label="{{ 'map.ariaLabel' | translate }}"
></div>

<button
  type="button"
  class="leaflet-map__fullscreen-btn"
  [attr.aria-label]="isFullscreen() ? 'Exit fullscreen' : 'Enter fullscreen'"
  (click)="toggleFullscreen()"
  aria-pressed="{{ isFullscreen() }}"
>
  <svg
    class="leaflet-map__icon"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >
    @if (isFullscreen()) {
      <!-- Exit fullscreen icon -->
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
    } @else {
      <!-- Fullscreen icon -->
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
    }
  </svg>
</button>

@if (isLoading()) {
  <div class="leaflet-map__overlay leaflet-map__overlay--loading" aria-live="polite" aria-busy="true">
    <span class="leaflet-map__spinner" aria-hidden="true"></span>
    <span>{{ 'map.loading' | translate }}</span>
  </div>
}

@if (loadError()) {
  <div class="leaflet-map__overlay leaflet-map__overlay--error" role="alert">
    {{ loadError() | translate }}
  </div>
}
